services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - DATABASE_URL=file:./data/dev.db
      - AUTH_URL=http://localhost:3000
      - AUTH_SECRET=${AUTH_SECRET}
      - NODE_ENV=production
    volumes:
      - data:/app/data
    restart: unless-stopped

volumes:
  data:
